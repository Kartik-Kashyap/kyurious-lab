<!DOCTYPE html>
<html>
<body>
<canvas id="canvas"></canvas>
<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let r1 = 150, r2 = 150; // Lengths
    let m1 = 15, m2 = 15;   // Masses
    let a1 = Math.PI/2, a2 = Math.PI/2; // Initial angles
    let a1_v = 0, a2_v = 0; // Velocities
    let g = 1;              // Gravity constant

    function draw() {
        ctx.fillStyle = "rgba(255, 255, 255, 0.1)"; // Motion blur effect
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Physics Formulas (Simplified for JS)
        let num1 = -g * (2 * m1 + m2) * Math.sin(a1);
        let num2 = -m2 * g * Math.sin(a1 - 2 * a2);
        let num3 = -2 * Math.sin(a1 - a2) * m2 * (a2_v * a2_v * r2 + a1_v * a1_v * r1 * Math.cos(a1 - a2));
        let den = r1 * (2 * m1 + m2 - m2 * Math.cos(2 * a1 - 2 * a2));
        let a1_a = (num1 + num2 + num3) / den;

        num1 = 2 * Math.sin(a1 - a2);
        num2 = (a1_v * a1_v * r1 * (m1 + m2));
        num3 = g * (m1 + m2) * Math.cos(a1);
        let num4 = a2_v * a2_v * r2 * m2 * Math.cos(a1 - a2);
        den = r2 * (2 * m1 + m2 - m2 * Math.cos(2 * a1 - 2 * a2));
        let a2_a = (num1 * (num2 + num3 + num4)) / den;

        // Origin point
        let cx = canvas.width/2, cy = canvas.height/3;
        let x1 = cx + r1 * Math.sin(a1), y1 = cy + r1 * Math.cos(a1);
        let x2 = x1 + r2 * Math.sin(a2), y2 = y1 + r2 * Math.cos(a2);

        // Draw Rods
        ctx.strokeStyle = '#333';
        ctx.beginPath();
        ctx.moveTo(cx, cy); ctx.lineTo(x1, y1); ctx.lineTo(x2, y2);
        ctx.stroke();

        // Update values
        a1_v += a1_a; a2_v += a2_a;
        a1 += a1_v; a2 += a2_v;

        requestAnimationFrame(draw);
    }
    draw();
</script>
</body>
</html>
