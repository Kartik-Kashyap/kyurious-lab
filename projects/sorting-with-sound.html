<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Sorting Auditoria | KYURIOUS LABS</title>
  <style>
    :root {
      --nav-bg: rgba(10, 10, 10, 0.9);
      --nav-border: rgba(255, 255, 255, 0.1);
      --accent: #00ffcc;
      --text: #ffffff;
      --bg: #0a0a0a;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding-top: 60px;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* === NAV BAR === */
    .lab-nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      background: var(--nav-bg);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--nav-border);
      z-index: 9999;
    }

    .nav-left .back-link {
      display: flex;
      align-items: center;
      color: #fff;
      text-decoration: none;
      font-size: 0.75rem;
      font-weight: 700;
      opacity: 0.7;
      transition: all 0.3s ease;
    }

    .nav-left .back-link:hover {
      opacity: 1;
      color: var(--accent);
    }

    .back-link .arrow {
      font-size: 1.3rem;
      margin-right: 8px;
    }

    .brand-name {
      font-weight: 800;
      font-size: 1rem;
      letter-spacing: 2px;
      color: var(--accent);
      text-shadow: 0 0 15px rgba(0, 255, 204, 0.3);
    }

    .status-container {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-text {
      font-size: 0.65rem;
      font-weight: 600;
      color: rgba(255,255,255,0.5);
      letter-spacing: 1px;
    }

    .status-pulse {
      width: 7px;
      height: 7px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--accent);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(0.9); opacity: 0.6; }
      50% { transform: scale(1.3); opacity: 1; }
    }

    /* Main Content */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
      font-size: 2.2rem;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #00ffcc, #00ccff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      text-align: center;
      color: rgba(255,255,255,0.6);
      margin-bottom: 30px;
      font-size: 1.1rem;
    }

    /* Controls */
    .controls {
      background: rgba(20, 20, 20, 0.8);
      border: 1px solid rgba(0, 255, 204, 0.2);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 25px;
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      justify-content: center;
      align-items: center;
    }

    button {
      padding: 12px 24px;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      background: #111;
      color: white;
      border: 1px solid var(--accent);
    }

    button:hover {
      background: var(--accent);
      color: black;
      transform: translateY(-2px);
    }

    button:active {
      transform: scale(0.95);
    }

    .btn-primary {
      background: var(--accent);
      color: black;
    }

    select, input[type="range"] {
      padding: 10px;
      background: #111;
      border: 1px solid rgba(0, 255, 204, 0.3);
      color: white;
      border-radius: 8px;
    }

    /* Canvas Container */
    .visualizer {
      background: #000;
      border: 1px solid rgba(0, 255, 204, 0.2);
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 20px;
      position: relative;
    }

    canvas {
      width: 100%;
      max-width: 100%;
      height: 380px;
      border-radius: 8px;
      background: #050505;
      display: block;
    }

    /* Info Bar */
    .info {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
      font-size: 0.9rem;
      color: rgba(255,255,255,0.7);
    }

    .legend {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
    }

    .bar {
      width: 18px;
      height: 8px;
      border-radius: 2px;
    }

    /* Mobile Optimizations */
    @media (max-width: 768px) {
      h1 { font-size: 1.8rem; }
      .controls { flex-direction: column; align-items: stretch; }
      button { padding: 14px; font-size: 1.05rem; }
      canvas { height: 320px; }
    }
  </style>
</head>
<body>

  <!-- NAV BAR -->
  <nav class="lab-nav">
    <div class="nav-left">
      <a href="../index.html" class="back-link">
        <span class="arrow">←</span> 
        <span class="back-text">BACK TO LABS</span>
      </a>
    </div>
    
    <div class="nav-center">
      <span class="brand-name">KYURIOUS LABS</span>
    </div>
    
    <div class="nav-right">
      <div class="status-container">
        <span class="status-pulse"></span>
        <span class="status-text">SYSTEM ACTIVE</span>
      </div>
    </div>
  </nav>

  <div class="container">
    <h1>Sorting Auditoria</h1>
    <p class="subtitle">Watch + Listen as chaos turns into harmony</p>

    <div class="controls">
      <select id="algorithm">
        <option value="bubble">Bubble Sort</option>
        <option value="merge">Merge Sort</option>
        <option value="quick">Quick Sort</option>
      </select>

      <input type="range" id="size" min="10" max="120" value="60" step="5" />
      <span id="sizeValue">60 elements</span>

      <input type="range" id="speed" min="1" max="100" value="30" />
      <span id="speedValue">Speed: Medium</span>

      <button id="generateBtn">New Array</button>
      <button id="sortBtn" class="btn-primary">Start Sorting</button>
      <button id="stopBtn">Stop</button>
      <button id="soundToggle">🔊 Sound ON</button>
    </div>

    <div class="visualizer">
      <canvas id="canvas"></canvas>
    </div>

    <div class="info">
      <div class="legend">
        <div class="legend-item"><div class="bar" style="background:#00ffcc;"></div> Comparing</div>
        <div class="legend-item"><div class="bar" style="background:#ff00aa;"></div> Swapping</div>
        <div class="legend-item"><div class="bar" style="background:#00ccff;"></div> Sorted</div>
      </div>
      <div id="status">Ready • Click "New Array" to begin</div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let array = [];
    let isSorting = false;
    let soundEnabled = true;
    let audioContext;
    let currentTimeouts = [];

    // Audio setup
    function initAudio() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
    }

    function playTone(frequency, duration, type = 'sine', volume = 0.2) {
      if (!soundEnabled || !audioContext) return;
      
      const oscillator = audioContext.createOscillator();
      const gainNode = audioContext.createGain();
      
      oscillator.type = type;
      oscillator.frequency.value = frequency;
      gainNode.gain.value = volume;
      
      oscillator.connect(gainNode);
      gainNode.connect(audioContext.destination);
      
      oscillator.start();
      setTimeout(() => {
        gainNode.gain.linearRampToValueAtTime(0.001, audioContext.currentTime + 0.05);
        setTimeout(() => oscillator.stop(), 100);
      }, duration);
    }

    // Resize canvas for mobile + desktop
    function resizeCanvas() {
      const containerWidth = document.querySelector('.visualizer').clientWidth - 30;
      canvas.width = Math.min(containerWidth, 1100);
      canvas.height = 380;
    }

    window.addEventListener('resize', resizeCanvas);

    // Generate random array
    function generateArray(size = 60) {
      array = [];
      for (let i = 0; i < size; i++) {
        array.push(Math.random() * 300 + 50); // values between 50-350
      }
      drawArray();
    }

    // Draw array as bars
    function drawArray(highlightIndices = [], swapIndices = [], sortedIndices = []) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      const barWidth = canvas.width / array.length;
      
      for (let i = 0; i < array.length; i++) {
        const height = array[i];
        let color = '#00ccff';
        
        if (sortedIndices.includes(i)) {
          color = '#00ff88';
        } else if (swapIndices.includes(i)) {
          color = '#ff00aa';
        } else if (highlightIndices.includes(i)) {
          color = '#ffff00';
        }
        
        ctx.fillStyle = color;
        ctx.fillRect(i * barWidth, canvas.height - height, barWidth - 1, height);
      }
    }

    // Play sound based on value
    function playSoundForValue(value, isSwap = false) {
      if (!soundEnabled) return;
      initAudio();
      
      // Map array value to frequency (100Hz - 1200Hz)
      const freq = 100 + (value / 350) * 1100;
      const type = isSwap ? 'sawtooth' : 'sine';
      const volume = isSwap ? 0.25 : 0.18;
      
      playTone(freq, 40, type, volume);
    }

    // Bubble Sort with sound
    async function bubbleSort() {
      const n = array.length;
      for (let i = 0; i < n - 1; i++) {
        for (let j = 0; j < n - i - 1; j++) {
          if (isSorting === false) return;

          drawArray([j, j + 1]);
          playSoundForValue(array[j]);

          if (array[j] > array[j + 1]) {
            [array[j], array[j + 1]] = [array[j + 1], array[j]];
            drawArray([], [j, j + 1]);
            playSoundForValue(array[j], true);
          }

          await new Promise(resolve => setTimeout(resolve, 101 - document.getElementById('speed').value));
        }
      }
      drawArray([], [], Array.from({length: n}, (_, i) => i));
    }

    // Quick Sort with sound
    async function quickSort(left = 0, right = array.length - 1) {
      if (left >= right || !isSorting) return;

      const pivotIndex = await partition(left, right);
      await quickSort(left, pivotIndex - 1);
      await quickSort(pivotIndex + 1, right);
    }

    async function partition(low, high) {
      const pivot = array[high];
      let i = low - 1;

      for (let j = low; j < high; j++) {
        if (!isSorting) return i + 1;

        drawArray([j, high]);
        playSoundForValue(array[j]);

        if (array[j] < pivot) {
          i++;
          [array[i], array[j]] = [array[j], array[i]];
          drawArray([], [i, j]);
          playSoundForValue(array[i], true);
        }
        await new Promise(r => setTimeout(r, 101 - document.getElementById('speed').value));
      }

      [array[i + 1], array[high]] = [array[high], array[i + 1]];
      drawArray([], [i + 1, high]);
      playSoundForValue(array[i + 1], true);

      return i + 1;
    }

    // Merge Sort (simplified visual version)
    async function mergeSort(arr, start = 0, end = array.length) {
      if (end - start <= 1 || !isSorting) return;

      const mid = Math.floor((start + end) / 2);
      await mergeSort(arr, start, mid);
      await mergeSort(arr, mid, end);
      await merge(arr, start, mid, end);
    }

    async function merge(arr, start, mid, end) {
      const left = arr.slice(start, mid);
      const right = arr.slice(mid, end);
      let i = 0, j = 0, k = start;

      while (i < left.length && j < right.length) {
        if (!isSorting) return;

        drawArray([k]);
        playSoundForValue(left[i] || right[j]);

        if (left[i] <= right[j]) {
          arr[k++] = left[i++];
        } else {
          arr[k++] = right[j++];
        }
        drawArray([], [k - 1]);
        await new Promise(r => setTimeout(r, 101 - document.getElementById('speed').value));
      }

      while (i < left.length) {
        arr[k++] = left[i++];
        drawArray([], [k - 1]);
        await new Promise(r => setTimeout(r, 101 - document.getElementById('speed').value));
      }

      while (j < right.length) {
        arr[k++] = right[j++];
        drawArray([], [k - 1]);
        await new Promise(r => setTimeout(r, 101 - document.getElementById('speed').value));
      }
    }

    // Main sort dispatcher
    async function startSorting() {
      if (isSorting) return;
      
      isSorting = true;
      document.getElementById('status').textContent = 'Sorting... Listen to the chaos → order';

      const algo = document.getElementById('algorithm').value;

      try {
        if (algo === 'bubble') {
          await bubbleSort();
        } else if (algo === 'quick') {
          await quickSort();
        } else if (algo === 'merge') {
          await mergeSort(array);
        }
      } catch (e) {
        console.error(e);
      }

      isSorting = false;
      if (document.getElementById('status').textContent.includes('Sorting')) {
        document.getElementById('status').textContent = 'Sorting Complete • Beautiful chaos turned into order 🎵';
      }
    }

    // Event Listeners
    document.getElementById('generateBtn').addEventListener('click', () => {
      if (isSorting) return;
      const size = parseInt(document.getElementById('size').value);
      generateArray(size);
      document.getElementById('status').textContent = 'New array generated • Ready to sort';
    });

    document.getElementById('sortBtn').addEventListener('click', startSorting);

    document.getElementById('stopBtn').addEventListener('click', () => {
      isSorting = false;
      document.getElementById('status').textContent = 'Sorting stopped';
    });

    document.getElementById('soundToggle').addEventListener('click', () => {
      soundEnabled = !soundEnabled;
      const btn = document.getElementById('soundToggle');
      btn.textContent = soundEnabled ? '🔊 Sound ON' : '🔇 Sound OFF';
    });

    // Range sliders
    const sizeSlider = document.getElementById('size');
    const sizeValue = document.getElementById('sizeValue');
    sizeSlider.addEventListener('input', () => {
      sizeValue.textContent = `${sizeSlider.value} elements`;
    });

    const speedSlider = document.getElementById('speed');
    const speedValue = document.getElementById('speedValue');
    speedSlider.addEventListener('input', () => {
      const speed = speedSlider.value;
      if (speed > 70) speedValue.textContent = 'Speed: Very Fast';
      else if (speed > 40) speedValue.textContent = 'Speed: Fast';
      else if (speed > 20) speedValue.textContent = 'Speed: Medium';
      else speedValue.textContent = 'Speed: Slow';
    });

    // Initialize
    window.onload = () => {
      resizeCanvas();
      generateArray(60);
      
      // Touch support for mobile
      canvas.addEventListener('touchstart', (e) => {
        if (!isSorting) generateArray(parseInt(document.getElementById('size').value));
      });
    };
  </script>
</body>
</html>
